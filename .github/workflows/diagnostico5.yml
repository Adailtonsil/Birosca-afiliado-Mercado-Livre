name: Diagnostico 6 (temporario)

on:
  workflow_dispatch: {}

jobs:
  diagnosticar6:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Executar diagnostico 6
        run: node diagnostico6.js
