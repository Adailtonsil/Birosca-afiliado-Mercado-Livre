name: Diagnostico 5 (temporario)

on:
  workflow_dispatch: {}

jobs:
  diagnosticar5:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Executar diagnostico 5
        run: node diagnostico5.js
