name: Adicionar novo produto

# Este workflow roda APENAS manualmente, pela aba "Actions" do GitHub.
# Nunca roda automaticamente -- você precisa clicar em "Run workflow"
# e preencher os dois campos abaixo.
on:
  workflow_dispatch:
    inputs:
      url_produto:
        description: "URL da página do produto (mercadolivre.com.br/...)"
        required: true
        type: string
      url_checkout:
        description: "URL de checkout / afiliado (ex: meli.la/...)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  adicionar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Adicionar produto ao produtos.json
        run: node adicionar-produto.js "${{ github.event.inputs.url_produto }}" "${{ github.event.inputs.url_checkout }}"

      - name: Gerar páginas otimizadas para SEO (catálogo + páginas de produto)
        run: node gerar-paginas-seo.js

      - name: Salvar (commit) os arquivos atualizados
        run: |
          git config user.name "Robo Adicionador"
          git config user.email "robo-adicionador@users.noreply.github.com"
          git add produtos.json index.html produto/ sitemap.xml
          git diff --staged --quiet && echo "Nenhuma mudança para salvar." || git commit -m "Novo produto adicionado via workflow manual ($(date -u +'%Y-%m-%d %H:%M UTC'))"
          git push
